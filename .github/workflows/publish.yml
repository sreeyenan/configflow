name: Publish Secure Binary Python Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-wheels:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag is from release branch
        shell: bash
        run: |
          git fetch origin "release/*:refs/remotes/origin/release/*"
          BRANCHES=$(git branch -r --contains ${{ github.sha }})
          echo "Branches containing this commit:"
          echo "$BRANCHES"

          if echo "$BRANCHES" | grep -q "release/"; then
            echo "✅ Tag is from a release branch"
          else
            echo "❌ Tag is not from a release branch"
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip cibuildwheel==2.16.5 build

      - name: Build wheels
        run: cibuildwheel --output-dir dist
        env:
          CIBW_BUILD_VERBOSITY: 2
          CIBW_BEFORE_BUILD: |
            python -m pip install --upgrade pip setuptools wheel
            python -m pip install "Cython>=3.0"
            python -m pip install clickhouse-core

      - name: Build sdist only on Linux
        if: runner.os == 'Linux'
        run: python -m build --sdist --outdir dist

      - name: Verify artifacts
        shell: bash
        run: |
          echo "=== Built files ==="
          ls -lh dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}-${{ github.sha }}
          path: dist/*

  publish:
    needs: build-wheels
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist

      - name: Verify files before publishing
        run: |
          echo "=== Files to publish ==="
          ls -lh dist/
          echo ""
          echo "=== Duplicate file check ==="
          find dist -type f -printf "%f\n" | sort | uniq -d

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
